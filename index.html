<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Gyroscope — Milky Way</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  html, body {
    width: 100%; height: 100%;
    background: #000008;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Space Mono', monospace;
    color: #c8d8ff;
  }

  #canvas-container {
    position: fixed; inset: 0;
  }
  canvas { display: block; }

  /* ── Permission splash ── */
  #permission-screen {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #0a0520 0%, #000008 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 0;
    padding: calc(var(--safe-top) + 20px) calc(var(--safe-right) + 24px) calc(var(--safe-bottom) + 20px) calc(var(--safe-left) + 24px);
  }

  #permission-screen.hidden { display: none; }

  .splash-stars {
    position: absolute; inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .splash-star {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: white;
    opacity: 0;
    animation: twinkle var(--dur) var(--delay) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--bright); transform: scale(1); }
  }

  .gyro-icon {
    width: 90px; height: 90px;
    position: relative;
    margin-bottom: 36px;
    animation: floatIcon 3s ease-in-out infinite;
  }
  @keyframes floatIcon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .gyro-icon svg { width: 100%; height: 100%; }

  .ring-spin-1 { animation: spinRing1 4s linear infinite; transform-origin: 50% 50%; }
  .ring-spin-2 { animation: spinRing2 5.5s linear infinite; transform-origin: 50% 50%; }
  .ring-spin-3 { animation: spinRing3 3s linear infinite; transform-origin: 50% 50%; }
  @keyframes spinRing1 { to { transform: rotate(360deg); } }
  @keyframes spinRing2 { to { transform: rotateY(360deg); } }
  @keyframes spinRing3 { to { transform: rotate(-360deg); } }

  .splash-title {
    font-family: 'Syncopate', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.28em;
    color: #e8f0ff;
    text-shadow: 0 0 40px rgba(100,150,255,0.7);
    margin-bottom: 10px;
    text-align: center;
  }
  .splash-sub {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(140,170,255,0.45);
    text-transform: uppercase;
    margin-bottom: 48px;
    text-align: center;
  }
  .splash-desc {
    font-size: 11px;
    line-height: 1.8;
    letter-spacing: 0.06em;
    color: rgba(180,200,255,0.6);
    text-align: center;
    max-width: 280px;
    margin-bottom: 44px;
  }

  #grant-btn {
    background: linear-gradient(135deg, rgba(60,100,220,0.3), rgba(80,140,255,0.2));
    border: 1px solid rgba(100,160,255,0.5);
    color: #b0d0ff;
    font-family: 'Syncopate', sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    padding: 16px 36px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }
  #grant-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(100,160,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  #grant-btn:active::after { opacity: 1; }
  #grant-btn:active { transform: scale(0.97); }

  #skip-btn {
    margin-top: 18px;
    background: none;
    border: none;
    color: rgba(140,170,255,0.3);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    cursor: pointer;
    padding: 8px;
    -webkit-tap-highlight-color: transparent;
    text-transform: uppercase;
  }

  /* ── HUD ── */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    animation: fadeHud 1.5s 0.5s forwards;
  }
  @keyframes fadeHud { to { opacity: 1; } }

  #title-block {
    position: absolute;
    top: calc(var(--safe-top) + 28px);
    left: calc(var(--safe-left) + 24px);
  }
  #title-block h1 {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(14px, 4vw, 22px);
    font-weight: 700;
    letter-spacing: 0.25em;
    color: #e8f0ff;
    text-shadow: 0 0 30px rgba(100,150,255,0.6);
  }
  #title-block p {
    margin-top: 5px;
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(140,170,255,0.4);
    text-transform: uppercase;
  }

  #gyro-mode-badge {
    position: absolute;
    top: calc(var(--safe-top) + 28px);
    right: calc(var(--safe-right) + 24px);
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: rgba(100,220,150,0.7);
    text-transform: uppercase;
    background: rgba(0,20,10,0.4);
    border: 1px solid rgba(80,200,130,0.25);
    padding: 7px 12px;
    border-radius: 2px;
  }
  #gyro-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(80,220,140,0.9);
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; box-shadow: 0 0 8px rgba(80,220,140,0.8); }
  }

  #gesture-hint {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 36px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeHint 2s 2s forwards, fadeOut 1s 6s forwards;
  }
  @keyframes fadeHint { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }

  .hint-icon { font-size: 22px; animation: wiggle 1.5s ease-in-out infinite; }
  @keyframes wiggle {
    0%,100% { transform: rotate(-12deg); }
    50% { transform: rotate(12deg); }
  }
  .hint-text {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(140,170,255,0.45);
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 16px; height: 16px;
    pointer-events: none;
    opacity: 0.25;
  }
  .corner.tl { top: calc(var(--safe-top) + 14px); left: calc(var(--safe-left) + 14px); border-top: 1px solid #8cb4ff; border-left: 1px solid #8cb4ff; }
  .corner.tr { top: calc(var(--safe-top) + 14px); right: calc(var(--safe-right) + 14px); border-top: 1px solid #8cb4ff; border-right: 1px solid #8cb4ff; }
  .corner.bl { bottom: calc(var(--safe-bottom) + 14px); left: calc(var(--safe-left) + 14px); border-bottom: 1px solid #8cb4ff; border-left: 1px solid #8cb4ff; }
  .corner.br { bottom: calc(var(--safe-bottom) + 14px); right: calc(var(--safe-right) + 14px); border-bottom: 1px solid #8cb4ff; border-right: 1px solid #8cb4ff; }

  /* Scanlines */
  #scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,20,0.05) 2px,rgba(0,0,20,0.05) 4px);
    pointer-events: none;
    z-index: 5;
  }

  /* Pinch zoom hint */
  #pinch-hint {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 36px);
    right: calc(var(--safe-right) + 20px);
    font-size: 8px;
    letter-spacing: 0.2em;
    color: rgba(140,170,255,0.3);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeHint 2s 3s forwards, fadeOut 1s 7s forwards;
  }
</style>
</head>
<body>

<!-- Permission Screen (iOS needs explicit user gesture) -->
<div id="permission-screen">
  <div class="splash-stars" id="splash-stars"></div>

  <div class="gyro-icon">
    <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer ring -->
      <g class="ring-spin-1">
        <circle cx="45" cy="45" r="40" stroke="rgba(68,170,255,0.6)" stroke-width="1.5" stroke-dasharray="4 3"/>
      </g>
      <!-- Middle ring -->
      <g class="ring-spin-2" style="transform-box:fill-box;">
        <ellipse cx="45" cy="45" rx="28" ry="12" stroke="rgba(100,220,255,0.7)" stroke-width="1.5"/>
      </g>
      <!-- Inner ring -->
      <g class="ring-spin-3">
        <circle cx="45" cy="45" r="18" stroke="rgba(150,200,255,0.5)" stroke-width="1"/>
      </g>
      <!-- Center -->
      <circle cx="45" cy="45" r="4" fill="rgba(255,240,180,0.9)"/>
      <circle cx="45" cy="45" r="8" fill="rgba(255,180,80,0.15)"/>
    </svg>
  </div>

  <div class="splash-title">GYROSCOPE</div>
  <div class="splash-sub">Milky Way · Stabilized Orientation</div>

  <div class="splash-desc">
    Tilt and move your phone to navigate the galaxy.<br>
    Gyroscope rings maintain fixed world orientation<br>
    while orbiting the galactic core.
  </div>

  <button id="grant-btn">Enable Gyroscope</button>
  <button id="skip-btn">Use Touch Only</button>
</div>

<div id="scanlines"></div>
<div id="canvas-container"></div>

<div id="hud">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="title-block">
    <h1>GYROSCOPE</h1>
    <p>Milky Way · Three.js</p>
  </div>

  <div id="gyro-mode-badge">
    <div id="gyro-dot"></div>
    <span id="gyro-label">Gyro Active</span>
  </div>

  <div id="gesture-hint">
    <div class="hint-icon">📱</div>
    <div class="hint-text">Tilt to explore</div>
  </div>

  <div id="pinch-hint">Pinch to zoom</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Gyroscope class ──────────────────────────────────────────────────────────
const _tObj = new THREE.Vector3(), _qObj = new THREE.Quaternion(), _sObj = new THREE.Vector3();
const _tWld = new THREE.Vector3(), _qWld = new THREE.Quaternion(), _sWld = new THREE.Vector3();

class Gyroscope extends THREE.Object3D {
  updateMatrixWorld(force) {
    this.matrixAutoUpdate && this.updateMatrix();
    if (this.matrixWorldNeedsUpdate || force) {
      if (this.parent !== null) {
        this.matrixWorld.multiplyMatrices(this.parent.matrixWorld, this.matrix);
        this.matrixWorld.decompose(_tWld, _qWld, _sWld);
        this.matrix.decompose(_tObj, _qObj, _sObj);
        this.matrixWorld.compose(_tWld, _qObj, _sWld);
      } else {
        this.matrixWorld.copy(this.matrix);
      }
      this.matrixWorldNeedsUpdate = false;
      force = true;
    }
    for (let i = 0; i < this.children.length; i++) {
      this.children[i].updateMatrixWorld(force);
    }
  }
}

// ─── Splash star field ────────────────────────────────────────────────────────
const splashContainer = document.getElementById('splash-stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'splash-star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;
    --dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;
    --bright:${0.3+Math.random()*0.7};`;
  splashContainer.appendChild(s);
}

// ─── Permission / skip flow ───────────────────────────────────────────────────
let gyroEnabled = false;
let deviceAlpha = 0, deviceBeta = 0, deviceGamma = 0;
let smoothAlpha = 0, smoothBeta = 0, smoothGamma = 0;
const GYRO_SMOOTH = 0.06;

function startGyro() {
  window.addEventListener('deviceorientation', e => {
    if (e.alpha !== null) {
      deviceAlpha = e.alpha;
      deviceBeta  = e.beta;
      deviceGamma = e.gamma;
      gyroEnabled = true;
    }
  }, true);
}

function onOrientationEvent(e) {
  deviceAlpha = e.alpha ?? 0;
  deviceBeta  = e.beta  ?? 0;
  deviceGamma = e.gamma ?? 0;
  gyroEnabled = true;
}

document.getElementById('grant-btn').addEventListener('click', async () => {
  // iOS 13+ requires permission request
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') {
        window.addEventListener('deviceorientation', onOrientationEvent, true);
        document.getElementById('gyro-label').textContent = 'Gyro Active';
      } else {
        document.getElementById('gyro-label').textContent = 'Touch Mode';
        document.getElementById('gyro-dot').style.background = 'rgba(200,150,80,0.8)';
      }
    } catch(err) {
      console.warn('Gyro permission error:', err);
    }
  } else {
    // Android / non-iOS: no permission needed
    window.addEventListener('deviceorientation', onOrientationEvent, true);
  }
  hideSplash();
});

document.getElementById('skip-btn').addEventListener('click', () => {
  document.getElementById('gyro-label').textContent = 'Touch Mode';
  document.getElementById('gyro-dot').style.background = 'rgba(200,150,80,0.6)';
  document.getElementById('gyro-dot').style.animation = 'none';
  hideSplash();
});

function hideSplash() {
  const el = document.getElementById('permission-screen');
  el.style.transition = 'opacity 0.8s';
  el.style.opacity = '0';
  setTimeout(() => el.classList.add('hidden'), 800);
}

// ─── Three.js setup ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000008, 50, 180);

const W = window.innerWidth, H = window.innerHeight;
const camera = new THREE.PerspectiveCamera(65, W / H, 0.1, 800);
camera.position.set(0, 6, 24);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x000005, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ─── Stars ────────────────────────────────────────────────────────────────────
function buildStars(count) {
  const pos = [], col = [];
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    let x, y, z;
    if (Math.random() < 0.65) {
      const dist = 30 + Math.random() * 200;
      x = Math.cos(theta) * dist;
      z = Math.sin(theta) * dist;
      y = (Math.random() - 0.5) * dist * 0.15;
    } else {
      const dist = 50 + Math.random() * 180;
      const phi = (Math.random() - 0.5) * Math.PI;
      x = Math.sin(phi) * Math.cos(theta) * dist;
      y = Math.cos(phi) * dist * 0.5;
      z = Math.sin(phi) * Math.sin(theta) * dist;
    }
    pos.push(x, y, z);
    if (Math.random() < 0.12) { col.push(1.0, 0.88, 0.65); }
    else { const b = 0.7 + Math.random() * 0.3; col.push(0.85, 0.9, b); }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({
    size: 1.0, vertexColors: true, transparent: true, opacity: 0.85,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
  }));
}

// Fewer stars on mobile for performance
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const starCount = isMobile ? 8000 : 13000;
const stars = buildStars(starCount);
scene.add(stars);

// Nebula
(function() {
  const pos = [], col = [];
  for (let i = 0; i < 1800; i++) {
    const theta = Math.random() * Math.PI * 2;
    const dist = 25 + Math.random() * 160;
    pos.push(Math.cos(theta)*dist, (Math.random()-.5)*dist*0.13, Math.sin(theta)*dist);
    const t = Math.random();
    col.push(0.15+t*0.25, 0.2+t*0.3, 0.55+t*0.45);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: 3.5, vertexColors: true, transparent: true, opacity: 0.065,
    blending: THREE.AdditiveBlending, depthWrite: false
  })));
})();

// Nucleus
const nucleus = new THREE.Mesh(
  new THREE.SphereGeometry(1.1, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xfff0cc })
);
scene.add(nucleus);
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(2.0, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xff8833, transparent: true, opacity: 0.1, side: THREE.DoubleSide })
));

// ─── Gyroscope ring assembly ──────────────────────────────────────────────────
function makeGyroAssembly(color) {
  const gyro = new Gyroscope();
  const mat = c => new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.75, side: THREE.DoubleSide });

  const r1 = new THREE.Mesh(new THREE.TorusGeometry(1.35, 0.022, 8, 72), mat(color));
  const r2 = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.018, 8, 56), mat(color));
  const r3 = new THREE.Mesh(new THREE.TorusGeometry(0.58, 0.013, 8, 44), mat(color));
  r2.rotation.x = Math.PI / 2;
  r3.rotation.y = Math.PI / 2;

  const spokeGeo = new THREE.BufferGeometry();
  spokeGeo.setAttribute('position', new THREE.Float32BufferAttribute([
    -1.35,0,0, 1.35,0,0, 0,-1.35,0, 0,1.35,0
  ], 3));
  const spokes = new THREE.LineSegments(spokeGeo,
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.22 })
  );
  const center = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));

  gyro.add(r1, r2, r3, spokes, center);
  return gyro;
}

// ─── Orbiting bodies ──────────────────────────────────────────────────────────
const orbits = [
  { r: 5.5, spd: 0.32, phase: 0,              tilt: 0.3,  color: 0x44aaff, y: 0   },
  { r: 8.5, spd: 0.19, phase: Math.PI*0.65,   tilt: -0.5, color: 0x66ddff, y: 1.4 },
  { r:11.5, spd: 0.12, phase: Math.PI*1.3,    tilt: 0.55, color: 0x88ffee, y: -1  },
  { r: 7.0, spd: 0.25, phase: Math.PI*0.4,    tilt: -0.2, color: 0x99bbff, y: -2  },
  { r: 9.5, spd: 0.16, phase: Math.PI,        tilt: 0.4,  color: 0x55ccff, y: 2   },
].map(({ r, spd, phase, tilt, color, y }) => {
  const pivot = new THREE.Object3D();
  pivot.rotation.z = tilt;
  scene.add(pivot);

  const arm = new THREE.Object3D();
  arm.position.set(r, y, 0);
  pivot.add(arm);

  // orbit path
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i/128) * Math.PI * 2;
    pts.push(Math.cos(a)*r, 0, Math.sin(a)*r);
  }
  const pathGeo = new THREE.BufferGeometry();
  pathGeo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  const path = new THREE.LineLoop(pathGeo,
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.12 })
  );
  path.rotation.z = tilt;
  scene.add(path);

  // planet
  arm.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.17, 10, 10),
    new THREE.MeshBasicMaterial({ color })
  ));

  // gyro
  arm.add(makeGyroAssembly(color));

  return { pivot, spd, phase };
});

// ─── Input state ──────────────────────────────────────────────────────────────
// Camera spherical coordinates
let camTheta = 0.3, camPhi = 0.42, camDist = 22;
let targetTheta = camTheta, targetPhi = camPhi, targetDist = camDist;

// Touch drag
let touchStart = null;
let pinchStartDist = 0;
let pinchStartCamDist = 0;

renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, theta: camTheta, phi: camPhi };
  } else if (e.touches.length === 2) {
    pinchStartDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchStartCamDist = camDist;
    touchStart = null;
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && touchStart) {
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    targetTheta = touchStart.theta - dx * 0.007;
    targetPhi   = Math.max(0.08, Math.min(Math.PI * 0.46, touchStart.phi - dy * 0.007));
  } else if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const scale = pinchStartDist / d;
    targetDist = Math.max(8, Math.min(50, pinchStartCamDist * scale));
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length < 2) pinchStartDist = 0;
  if (e.touches.length === 0) touchStart = null;
}, { passive: false });

// ─── Gyro → camera mapping ────────────────────────────────────────────────────
// We'll use device orientation to nudge camera, biased by initial orientation
let baseAlpha = null, baseBeta = null;

function applyGyroToCamera(dt) {
  if (!gyroEnabled) return;

  // Smooth gyro values
  const a = GYRO_SMOOTH;
  smoothAlpha += (deviceAlpha - smoothAlpha) * a * 60 * dt;
  smoothBeta  += (deviceBeta  - smoothBeta)  * a * 60 * dt;

  if (baseAlpha === null) { baseAlpha = smoothAlpha; baseBeta = smoothBeta; }

  let dAlpha = smoothAlpha - baseAlpha;
  // Wrap alpha difference to [-180, 180]
  if (dAlpha > 180)  dAlpha -= 360;
  if (dAlpha < -180) dAlpha += 360;

  const dBeta  = smoothBeta - baseBeta;

  // Map to camera angles
  targetTheta = 0.3 - dAlpha * (Math.PI / 180) * 0.7;
  targetPhi   = Math.max(0.08, Math.min(Math.PI * 0.46, 0.42 + dBeta * (Math.PI / 180) * 0.5));
}

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Animate ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const camTarget = new THREE.Vector3(0, 0, 0);
const LERP = 0.08;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t  = clock.elapsedTime;

  // Orbits
  orbits.forEach(({ pivot, spd, phase }) => {
    pivot.rotation.y = t * spd + phase;
  });

  // Nucleus pulse
  nucleus.scale.setScalar(1 + Math.sin(t * 1.8) * 0.055);

  // Stars drift
  stars.rotation.y = t * 0.003;

  // Gyro input
  applyGyroToCamera(dt);

  // Smooth camera
  camTheta += (targetTheta - camTheta) * LERP * 60 * dt;
  camPhi   += (targetPhi   - camPhi)   * LERP * 60 * dt;
  camDist  += (targetDist  - camDist)  * LERP * 60 * dt;

  camera.position.x = camDist * Math.sin(camTheta) * Math.sin(camPhi);
  camera.position.y = camDist * Math.cos(camPhi);
  camera.position.z = camDist * Math.cos(camTheta) * Math.sin(camPhi);
  camera.lookAt(camTarget);

  renderer.render(scene, camera);
}

animate();
</script>
